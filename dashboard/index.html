<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchTower AI — Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
        .card-hover:hover { border-color: #3b82f6; transition: border-color 0.2s; }
        .badge-healthy { background: #064e3b; color: #6ee7b7; }
        .badge-unhealthy { background: #7f1d1d; color: #fca5a5; }
        .badge-increasing { background: #7f1d1d; color: #fca5a5; }
        .badge-decreasing { background: #064e3b; color: #6ee7b7; }
        .badge-stable { background: #1e3a5f; color: #93c5fd; }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .tab-inactive { border-bottom: 2px solid transparent; color: #94a3b8; }
        .tab-inactive:hover { color: #e2e8f0; }
        .progress-bar { background: #334155; border-radius: 9999px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #3b82f6, #8b5cf6); border-radius: 9999px; transition: width 0.5s ease; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- API Configuration ---
        const API_BASE = "http://localhost:5000/api";

        // --- API Helper ---
        async function fetchAPI(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                return await res.json();
            } catch (err) {
                console.error(`API error (${endpoint}):`, err);
                return null;
            }
        }

        // --- Badge Component ---
        function Badge({ text, type }) {
            const classes = {
                healthy: "badge-healthy",
                unhealthy: "badge-unhealthy",
                increasing: "badge-increasing",
                decreasing: "badge-decreasing",
                stable: "badge-stable",
                insufficient_data: "badge-stable",
            };
            return (
                <span className={`px-2 py-1 rounded-full text-xs font-medium ${classes[type] || "badge-stable"}`}>
                    {text}
                </span>
            );
        }

        // --- Health Overview ---
        function HealthPanel({ health }) {
            if (!health) return <div className="card p-6 text-center text-gray-400">Loading health data...</div>;

            const clients = Object.entries(health.clients || {});
            if (clients.length === 0) return <div className="card p-6 text-center text-gray-400">No heartbeat data yet. Run the agent first.</div>;

            return (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    {clients.map(([name, info]) => (
                        <div key={name} className="card card-hover p-5">
                            <div className="flex justify-between items-center mb-3">
                                <h3 className="font-semibold text-white">{name}</h3>
                                <Badge text={info.status} type={info.status} />
                            </div>
                            <p className="text-sm text-gray-400">
                                Last success: {info.last_success ? new Date(info.last_success).toLocaleString() : "Never"}
                            </p>
                            {info.hours_since !== null && (
                                <p className="text-sm text-gray-400">{info.hours_since}h ago</p>
                            )}
                        </div>
                    ))}
                </div>
            );
        }

        // --- Trend Cards ---
        function TrendPanel({ trends }) {
            if (!trends) return <div className="card p-6 text-center text-gray-400">Loading trend data...</div>;

            const data = trends.trends || [];
            if (data.length === 0) return <div className="card p-6 text-center text-gray-400">No trend data available. Run the agent for a few days first.</div>;

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                    {data.map((trend) => {
                        const emoji = { increasing: "\u{1F53A}", decreasing: "\u{1F53B}", stable: "\u{27A1}\u{FE0F}", insufficient_data: "\u{2753}" }[trend.trend_direction] || "\u{2753}";
                        return (
                            <div key={trend.competitor} className="card card-hover p-5">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="font-semibold text-white">{emoji} {trend.competitor}</h3>
                                    <Badge text={trend.trend_direction} type={trend.trend_direction} />
                                </div>
                                <div className="space-y-2 text-sm">
                                    <div className="flex justify-between text-gray-400">
                                        <span>Scans</span>
                                        <span className="text-white">{trend.total_scans}</span>
                                    </div>
                                    <div className="flex justify-between text-gray-400">
                                        <span>Significant changes</span>
                                        <span className="text-white">{trend.significant_changes}</span>
                                    </div>
                                    {trend.change_frequency && (
                                        <div className="flex justify-between text-gray-400">
                                            <span>Avg frequency</span>
                                            <span className="text-white">every {trend.change_frequency} days</span>
                                        </div>
                                    )}
                                    <div className="mt-3">
                                        <div className="flex justify-between text-gray-400 mb-1">
                                            <span>Stability</span>
                                            <span className="text-white">{trend.stability_score}%</span>
                                        </div>
                                        <div className="progress-bar h-2">
                                            <div className="progress-fill h-full" style={{ width: `${trend.stability_score}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // --- Scan History ---
        function ScanPanel({ competitors, selectedCompetitor, setSelectedCompetitor, scans }) {
            if (!competitors || competitors.length === 0) {
                return <div className="card p-6 text-center text-gray-400">No competitors found in the database.</div>;
            }

            return (
                <div>
                    <div className="flex flex-wrap gap-2 mb-4">
                        {competitors.map((name) => (
                            <button
                                key={name}
                                onClick={() => setSelectedCompetitor(name)}
                                className={`px-4 py-2 rounded-lg text-sm font-medium transition ${
                                    selectedCompetitor === name
                                        ? "bg-blue-600 text-white"
                                        : "bg-gray-700 text-gray-300 hover:bg-gray-600"
                                }`}
                            >
                                {name}
                            </button>
                        ))}
                    </div>

                    {scans && scans.scans ? (
                        <div className="space-y-3">
                            {scans.scans.map((scan) => (
                                <div key={scan.id} className="card card-hover p-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-sm text-blue-400">
                                            {new Date(scan.timestamp).toLocaleString()}
                                        </span>
                                        <span className="text-xs text-gray-500">
                                            {scan.text_length.toLocaleString()} chars
                                        </span>
                                    </div>
                                    <p className="text-sm text-gray-300 leading-relaxed">
                                        {scan.text_preview}
                                    </p>
                                </div>
                            ))}
                            {scans.scans.length === 0 && (
                                <div className="card p-6 text-center text-gray-400">
                                    No scans found for {selectedCompetitor}.
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="card p-6 text-center text-gray-400">
                            Select a competitor to view scan history.
                        </div>
                    )}
                </div>
            );
        }

        // --- Main App ---
        function App() {
            const [activeTab, setActiveTab] = useState("health");
            const [health, setHealth] = useState(null);
            const [trends, setTrends] = useState(null);
            const [competitors, setCompetitors] = useState([]);
            const [selectedCompetitor, setSelectedCompetitor] = useState(null);
            const [scans, setScans] = useState(null);
            const [connected, setConnected] = useState(null);

            // Check API connection
            useEffect(() => {
                fetchAPI("/health").then((data) => {
                    setConnected(data !== null);
                    if (data) setHealth(data);
                });
                fetchAPI("/competitors").then((data) => {
                    if (data) setCompetitors(data.competitors || []);
                });
            }, []);

            // Load tab data
            useEffect(() => {
                if (activeTab === "health") {
                    fetchAPI("/health").then(setHealth);
                } else if (activeTab === "trends") {
                    fetchAPI("/trends?days=30").then(setTrends);
                }
            }, [activeTab]);

            // Load scans when competitor is selected
            useEffect(() => {
                if (selectedCompetitor) {
                    fetchAPI(`/scans/${encodeURIComponent(selectedCompetitor)}?limit=20`).then(setScans);
                }
            }, [selectedCompetitor]);

            const tabs = [
                { id: "health", label: "System Health" },
                { id: "trends", label: "Trend Analysis" },
                { id: "history", label: "Scan History" },
            ];

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="border-b border-gray-700 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <span className="text-2xl">{"\u{1F52D}"}</span>
                                <h1 className="text-xl font-bold text-white">WatchTower AI</h1>
                                <span className="text-sm text-gray-400">Dashboard</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full ${connected ? "bg-green-400" : connected === false ? "bg-red-400" : "bg-yellow-400"}`}></div>
                                <span className="text-sm text-gray-400">
                                    {connected ? "API Connected" : connected === false ? "API Offline" : "Connecting..."}
                                </span>
                            </div>
                        </div>
                    </header>

                    {/* Tabs */}
                    <nav className="border-b border-gray-700 px-6">
                        <div className="max-w-7xl mx-auto flex gap-6">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`py-3 text-sm font-medium ${
                                        activeTab === tab.id ? "tab-active" : "tab-inactive"
                                    }`}
                                >
                                    {tab.label}
                                </button>
                            ))}
                        </div>
                    </nav>

                    {/* Content */}
                    <main className="max-w-7xl mx-auto px-6 py-6">
                        {!connected && connected !== null && (
                            <div className="card p-6 mb-6 border-yellow-600 text-center">
                                <p className="text-yellow-300 font-medium mb-2">
                                    {"\u{26A0}\u{FE0F}"} API server is not running
                                </p>
                                <p className="text-gray-400 text-sm">
                                    Start the dashboard API with: <code className="bg-gray-800 px-2 py-1 rounded">python dashboard/api.py</code>
                                </p>
                            </div>
                        )}

                        {activeTab === "health" && <HealthPanel health={health} />}
                        {activeTab === "trends" && <TrendPanel trends={trends} />}
                        {activeTab === "history" && (
                            <ScanPanel
                                competitors={competitors}
                                selectedCompetitor={selectedCompetitor}
                                setSelectedCompetitor={setSelectedCompetitor}
                                scans={scans}
                            />
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="border-t border-gray-700 px-6 py-4 mt-8">
                        <div className="max-w-7xl mx-auto text-center text-sm text-gray-500">
                            WatchTower AI v2.0 — Built by Marina Kurland
                        </div>
                    </footer>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById("root"));
    </script>
</body>
</html>

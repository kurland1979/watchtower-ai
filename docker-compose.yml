# =============================================================================
# WatchTower AI — Docker Compose
#
# Services:
#   agent    — Main scheduler (runs daily scans at configured time)
#   dashboard — REST API + Web UI (Gunicorn, port 5000)
#
# Usage:
#   docker compose up -d          # Start both services
#   docker compose logs -f agent  # Watch agent logs
#   docker compose down           # Stop everything
# =============================================================================

version: "3.9"

services:
  agent:
    build: .
    container_name: watchtower-agent
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
    volumes:
      # Persist database and logs across container restarts
      - watchtower-data:/app/logs
      - watchtower-config:/app/config/clients
    command: python main.py
    healthcheck:
      test: ["CMD", "python", "-c", "from agents.heartbeat import get_health_status; s = get_health_status(); exit(0 if s['overall'] == 'healthy' else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: watchtower-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      - ENVIRONMENT=production
    ports:
      - "5000:5000"
    volumes:
      # Share database with agent service
      - watchtower-data:/app/logs
      - watchtower-config:/app/config/clients
    command: gunicorn wsgi:app --bind 0.0.0.0:5000 --workers 2 --timeout 30

volumes:
  watchtower-data:
    driver: local
  watchtower-config:
    driver: local
